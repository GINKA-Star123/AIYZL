<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字幕显示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            overflow: hidden;
        }
        
        #subtitle-container {
            width: 90%;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #subtitle {
            font-size: 48px;
            color: white;
            font-weight: bold;
            text-shadow: 
                2px 2px 8px rgba(0, 0, 0, 0.9),
                -2px -2px 8px rgba(0, 0, 0, 0.9),
                2px -2px 8px rgba(0, 0, 0, 0.9),
                -2px 2px 8px rgba(0, 0, 0, 0.9);
            line-height: 1.5;
            word-break: break-all;
            transition: opacity 0.1s ease;
        }
        
        #status {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div id="status">🔄 连接中...</div>
    <div id="subtitle-container">
        <div id="subtitle"></div>
    </div>

    <script>
        const subtitle_element = document.getElementById('subtitle');
        const status_element = document.getElementById('status');
        
        let ws = null;
        let reconnect_timeout = null;
        
        // WebSocket 服务器地址（本地）
        const WS_URL = 'ws://localhost:8765';
        
        function update_status(text, color = 'white') {
            status_element.textContent = text;
            status_element.style.color = color;
        }
        
        function connect_websocket() {
            console.log('🔗 尝试连接 WebSocket...');
            update_status('🔄 连接中...', 'yellow');
            
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = function() {
                    console.log('✅ WebSocket 已连接');
                    update_status('✅ 已连接', 'lime');
                    
                    // 清除重连定时器
                    if (reconnect_timeout) {
                        clearTimeout(reconnect_timeout);
                        reconnect_timeout = null;
                    }
                };
                
                ws.onmessage = function(event) {
                    const text = event.data;
                    console.log(`📨 收到: "${text}"`);
                    
                    // 更新显示
                    subtitle_element.textContent = text;
                    subtitle_element.style.opacity = text.trim() ? '1' : '0';
                    
                    // 同时更新字幕文件（仅本地）
                    if (text === '') {
                        subtitle_element.style.opacity = '0';
                    }
                };
                
                ws.onerror = function(error) {
                    console.error('❌ WebSocket 错误:', error);
                    update_status('❌ 连接错误', 'red');
                };
                
                ws.onclose = function() {
                    console.log('⚠️ WebSocket 连接已断开');
                    update_status('⚠️ 已断开', 'orange');
                    
                    // 5秒后尝试重新连接
                    if (!reconnect_timeout) {
                        reconnect_timeout = setTimeout(connect_websocket, 5000);
                    }
                };
                
            } catch (error) {
                console.error('❌ WebSocket 错误:', error);
                update_status('❌ 连接失败', 'red');
                
                // 5秒后重试
                if (!reconnect_timeout) {
                    reconnect_timeout = setTimeout(connect_websocket, 5000);
                }
            }
        }
        
        // 页面加载时连接
        window.addEventListener('load', function() {
            console.log('📄 页面已加载');
            connect_websocket();
        });
        
        // 页面卸载时关闭连接
        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
        });
        
        // 初始化
        console.log('🚀 字幕显示页面已加载');
        console.log(`📍 WebSocket 地址: ${WS_URL}`);
    </script>
</body>
</html>
